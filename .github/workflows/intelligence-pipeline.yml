name: SSI Intelligence Pipeline

on:
  schedule:
    # Runs daily at 05:30 IST (00:00 UTC) after data refresh completes
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limit symbols processed'
        type: number
        default: 0
      symbols:
        description: 'Comma-separated symbols (empty = all)'
        type: string
        default: ''
      dry_run:
        description: 'Dry run (no side effects)'
        type: boolean
        default: false

jobs:
  intelligence-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install yfinance pandas numpy nsepython

      - name: Build backend
        run: npm run build:backend

      # === Phase 1: Research Snapshots ===
      - name: Generate Research Snapshots
        id: research
        continue-on-error: true
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.limit }}" != "0" ] && [ "${{ github.event.inputs.limit }}" != "" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.symbols }}" != "" ]; then
            ARGS="$ARGS --symbols ${{ github.event.inputs.symbols }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          npx tsx scripts/intelligence/run-job.ts generate-research $ARGS
        timeout-minutes: 30

      # === Phase 2: Rankings Refresh ===
      - name: Refresh Rankings
        id: rankings
        if: steps.research.outcome == 'success'
        continue-on-error: true
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          npx tsx scripts/intelligence/run-job.ts refresh-rankings $ARGS
        timeout-minutes: 15

      # === Phase 3: Watchlist Alerts ===
      - name: Generate Watchlist Alerts
        id: alerts
        if: steps.rankings.outcome == 'success'
        continue-on-error: true
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          npx tsx scripts/intelligence/run-job.ts generate-watchlist-alerts $ARGS
        timeout-minutes: 10

      # === Summary ===
      - name: Pipeline Summary
        if: always()
        run: |
          echo "=== Intelligence Pipeline Summary ==="
          echo "Research Snapshots: ${{ steps.research.outcome }}"
          echo "Rankings Refresh:   ${{ steps.rankings.outcome }}"
          echo "Watchlist Alerts:   ${{ steps.alerts.outcome }}"
          echo "Completed at: $(date)"
