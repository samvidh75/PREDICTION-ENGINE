name: Release Gate

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stockstory
          POSTGRES_PASSWORD: stockstory
          POSTGRES_DB: stockstory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DB_ADAPTER: postgres
      ALLOW_SQLITE_FALLBACK: "false"
      ALLOW_SQLITE_IN_PRODUCTION: "false"
      DATABASE_URL: postgresql://stockstory:stockstory@localhost:5432/stockstory_test
      COOKIE_SECRET: test-only-ci-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck all
        run: npx tsc -p tsconfig.all.json --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Frontend build
        run: npx vite build

      - name: Backend compile
        run: npx tsc -p tsconfig.backend.emit.json

      - name: Run migrations
        run: npx tsx src/db/migrate.ts

      - name: Seed CI fixtures
        run: npm run seed:ci

      - name: PostgreSQL integration tests
        run: npm run test:integration:postgres

      - name: Schema validation
        run: npx tsx scripts/validate-schema-contract.ts

      - name: Distribution validation
        run: npx tsx scripts/validate-sector-distributions.ts

      - name: Build Docker image
        run: docker build -t stockstory-api:test .

      - name: Start container with PostgreSQL
        run: |
          docker run -d \
            --name stockstory-api-test \
            -p 4001:4001 \
            -e NODE_ENV=production \
            -e DB_ADAPTER=postgres \
            -e ALLOW_SQLITE_FALLBACK=false \
            -e ALLOW_SQLITE_IN_PRODUCTION=false \
            -e DATABASE_URL=postgresql://stockstory:stockstory@host.docker.internal:5432/stockstory_test \
            -e COOKIE_SECRET=ci-test-secret-not-for-production \
            --add-host=host.docker.internal:host-gateway \
            stockstory-api:test

      - name: Verify /readyz
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:4001/healthz && curl -fsS http://localhost:4001/readyz; then
              echo "Container ready with /healthz + /readyz after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          docker logs stockstory-api-test
          exit 1
        shell: bash

      - name: Validate API states against Docker
        run: |
          API_BASE_URL=http://localhost:4001 npx tsx scripts/smoke-test-api.ts

      - name: Clean up Docker
        if: always()
        run: docker rm -f stockstory-api-test || true

      - name: Release gate report
        run: npx tsx scripts/release-gate.ts
