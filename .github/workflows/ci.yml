name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck:all

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  integration-tests-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:integration:sqlite

  integration-tests-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stockstory
          POSTGRES_PASSWORD: stockstory
          POSTGRES_DB: stockstory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DB_ADAPTER: postgres
      ALLOW_SQLITE_FALLBACK: "false"
      ALLOW_SQLITE_IN_PRODUCTION: "false"
      DATABASE_URL: postgresql://stockstory:stockstory@localhost:5432/stockstory_test
      COOKIE_SECRET: test-only-ci-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run migrate
      - run: npm run test:integration:postgres

  schema-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate:schema

  distribution-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate:distributions

  data-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate:data-integrity
      - run: npm run validate:hygiene

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:vercel

  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:backend

  compile-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run compile:backend

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:coverage

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high

  query-schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate:query-schema

  api-state-contract:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stockstory
          POSTGRES_PASSWORD: stockstory
          POSTGRES_DB: stockstory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DB_ADAPTER: postgres
      ALLOW_SQLITE_FALLBACK: "false"
      ALLOW_SQLITE_IN_PRODUCTION: "false"
      DATABASE_URL: postgresql://stockstory:stockstory@localhost:5432/stockstory_test
      COOKIE_SECRET: test-only-ci-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run migrate
      - run: npm run seed:ci
      - run: |
          npm run start:dev &
          npx wait-on http://localhost:4001/healthz -t 30000
          npx wait-on http://localhost:4001/readyz -t 30000
          API_BASE_URL=http://localhost:4001 npm run validate:api-states
        shell: bash

  docker-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stockstory
          POSTGRES_PASSWORD: stockstory
          POSTGRES_DB: stockstory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DB_ADAPTER: postgres
      ALLOW_SQLITE_FALLBACK: "false"
      ALLOW_SQLITE_IN_PRODUCTION: "false"
      DATABASE_URL: postgresql://stockstory:stockstory@localhost:5432/stockstory_test
      COOKIE_SECRET: test-only-ci-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run migrate
      - run: npm run seed:ci
      - run: |
          docker build -t stockstory-api:test .
          docker run -d \
            --name stockstory-api-test \
            -p 4001:4001 \
            -e NODE_ENV=production \
            -e DB_ADAPTER=postgres \
            -e ALLOW_SQLITE_FALLBACK=false \
            -e ALLOW_SQLITE_IN_PRODUCTION=false \
            -e DATABASE_URL=postgresql://stockstory:stockstory@host.docker.internal:5432/stockstory_test \
            -e COOKIE_SECRET=ci-test-secret-not-for-production \
            --add-host=host.docker.internal:host-gateway \
            stockstory-api:test
          npx wait-on http://localhost:4001/healthz -t 30000
          npx wait-on http://localhost:4001/readyz -t 30000
          API_BASE_URL=http://localhost:4001 npm run validate:api-states
        shell: bash
      - run: docker logs stockstory-api-test
        if: always()
      - run: docker rm -f stockstory-api-test || true
        if: always()
