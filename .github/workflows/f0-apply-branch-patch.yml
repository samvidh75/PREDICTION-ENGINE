name: F0 Apply Branch Patch

on:
  push:
    branches:
      - track-f0-closure-truth-browser
    paths:
      - scripts/f0-closure.patch

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out F0 branch
        uses: actions/checkout@v4
        with:
          ref: track-f0-closure-truth-browser

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply source patch
        run: |
          git apply --check scripts/f0-closure.patch
          git apply scripts/f0-closure.patch

      - name: Refresh Playwright lockfile entry
        run: npm install --save-dev --package-lock-only --ignore-scripts --no-audit --no-fund @playwright/test

      - name: Commit branch patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(f0): complete truth browser closure slice"
          git push origin HEAD:track-f0-closure-truth-browser
