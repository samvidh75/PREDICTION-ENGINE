version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# StockStory India — docker-compose.yml
# Services:
#   api       – Fastify backend (port 4001)
#   web       – Nginx serving the Vite SPA (port 80 / 443)
#   postgres  – PostgreSQL database
#   redis     – Redis cache
#   ollama    – Free LLM inference (port 11434) — replaces OpenAI API
#   qdrant    – Free vector DB (port 6333) — replaces Pinecone
#   prometheus – Free metrics collection (port 9090) — replaces DataDog
#   grafana   – Free dashboards (port 3000)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── API (Fastify backend) ────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runner
    container_name: stockstory_api
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: "4001"
      HOST: "0.0.0.0"
      OLLAMA_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - stockstory_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Web (Nginx static + reverse-proxy) ──────────────────────────────────
  web:
    image: nginx:1.27-alpine
    container_name: stockstory_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - stockstory_net

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: stockstory_postgres
    restart: unless-stopped
    env_file: .env.production
    environment:
      POSTGRES_DB: stockstory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD_PROD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stockstory_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: stockstory_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    networks:
      - stockstory_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama — Free LLM inference (replaces OpenAI API) ──────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: stockstory_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: 600
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - stockstory_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── SGLang — Fast LLM inference server (optional GPU acceleration) ─────
  sglang:
    build:
      context: ./infrastructure/sglang-server
      dockerfile: Dockerfile.cpu
    container_name: stockstory_sglang
    restart: unless-stopped
    ports:
      - "8000:30000"
    environment:
      SGLANG_URL: http://sglang:30000
      OLLAMA_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - stockstory_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30000/v1/models"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

  # ── Qdrant — Free vector database (replaces Pinecone) ──────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: stockstory_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__STORAGE__SNAPSHOTS_PATH: /qdrant/snapshots
    volumes:
      - qdrant_storage:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    networks:
      - stockstory_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Prometheus — Free metrics collection ───────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: stockstory_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - stockstory_net

  # ── Grafana — Free dashboards ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: stockstory_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
      GF_SERVER_HTTP_PORT: 3000
    volumes:
      - grafana_storage:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - stockstory_net

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  qdrant_storage:
  qdrant_snapshots:
  prometheus_data:
  grafana_storage:

networks:
  stockstory_net:
    driver: bridge
