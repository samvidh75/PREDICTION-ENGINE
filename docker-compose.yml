version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# StockStory India — docker-compose.yml
# Services:
#   api      – Fastify backend (port 4001)
#   web      – Nginx serving the Vite SPA (port 80 / 443)
#   postgres – PostgreSQL database
#   redis    – Redis cache
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── API (Fastify backend) ────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runner
    container_name: stockstory_api
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: "4001"
      HOST: "0.0.0.0"
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stockstory_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Web (Nginx static + reverse-proxy) ──────────────────────────────────
  web:
    image: nginx:1.27-alpine
    container_name: stockstory_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount TLS certs if managing them manually:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - stockstory_net

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: stockstory_postgres
    restart: unless-stopped
    env_file: .env.production
    environment:
      POSTGRES_DB: stockstory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stockstory_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: stockstory_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    networks:
      - stockstory_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  stockstory_net:
    driver: bridge
