# StockStory India — Oracle VM Deployment (Backend + Ollama)
# Frontend stays on Vercel. Database stays on Neon.
# Uses Caddy for auto SSL (port 443).

services:

  # ── Fastify Backend API ──────────────────────────────────────────
  api:
    build:
      context: .
      target: runner
    container_name: stockstory_api
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: "4001"
      HOST: "0.0.0.0"
      OLLAMA_URL: http://ollama:11434
      SGLANG_URL: ""
      ENABLE_RESEARCH_BOT: "true"
      ENABLE_SCORE_EXPLANATIONS: "true"
      ENABLE_STOCK_SNAPSHOTS: "true"
      ENABLE_STOCK_COMPARISON: "true"
      ENABLE_SCANNER_THESES: "true"
      ENABLE_THESIS_TRACKING: "true"
    expose:
      - "4001"
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - stockstory_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Ollama (Free LLM Inference) ───────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: stockstory_ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_KEEP_ALIVE: 24h
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    networks:
      - stockstory_net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          memory: 4G
        limits:
          memory: 8G

  # ── Caddy (Auto SSL Reverse Proxy) ────────────────────────────────
  caddy:
    image: caddy:alpine
    container_name: stockstory_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - stockstory_net

networks:
  stockstory_net:
    driver: bridge

volumes:
  ollama_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
