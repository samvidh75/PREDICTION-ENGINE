# =========================================================================
# STOCKSTORY HIGH-CONCURRENCY NGINX GATEWAY
# =========================================================================
# Deploy: sudo ln -sf /path/to/this/file /etc/nginx/sites-available/stockstory
#         sudo nginx -t && sudo systemctl restart nginx
# =========================================================================

limit_req_zone $binary_remote_addr zone=api_rate_limit:15m rate=15r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

upstream backend_fastapi {
    server 127.0.0.1:8000 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

upstream local_ollama {
    server 127.0.0.1:11434 max_fails=2 fail_timeout=15s;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name api.stockstory.in;

    client_body_buffer_size 128k;
    client_max_body_size 5m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 20s;
    send_timeout 8s;

    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1000;

    location /api/v1/market-stream/ {
        limit_req zone=api_rate_limit burst=30 nodelay;
        limit_conn conn_limit 8;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://backend_fastapi;

        proxy_next_upstream error timeout invalid_header http_500 http_502;
        proxy_connect_timeout 4s;
        proxy_read_timeout 8s;
        proxy_send_timeout 8s;
    }

    location /api/v1/evaluate {
        limit_req zone=api_rate_limit burst=20 nodelay;
        limit_conn conn_limit 8;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_pass http://localhost:8787;
        proxy_http_version 1.1;

        proxy_connect_timeout 4s;
        proxy_read_timeout 10s;
        proxy_send_timeout 8s;
    }

    location /api/v1/chat/ {
        limit_req zone=api_rate_limit burst=10 nodelay;
        limit_conn conn_limit 4;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_pass http://local_ollama/api/generate;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    location / {
        return 404 "{ \"error\": \"not_found\" }";
        add_header Content-Type application/json;
    }
}
