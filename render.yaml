# render.yaml
# Render Blueprint — StockStory India
# Docs: https://render.com/docs/blueprint-spec
#
# Deploys:
#   1. stockstory-api  — Fastify backend (Web Service, persistent Node 20)
#   2. stockstory-migrate — one-off DB migration job (runs before server starts)

services:
  # ── Backend API — persistent Fastify server ──────────────────────────────
  - type: web
    name: stockstory-api
    runtime: node
    region: singapore          # closest to India
    plan: starter              # $7/mo — upgrade to standard for production load
    branch: main

    buildCommand: npm ci && npm run compile:backend && npm run build

    # Start: run compiled JavaScript (production-optimized, no tsx needed at runtime)
    # Render injects PORT automatically — startServer.js reads process.env.PORT
    startCommand: npm start

    # Health check — Render uses this to confirm the service is healthy
    healthCheckPath: /healthz

    # Auto-deploy on every push to main
    autoDeploy: true

    # Environment variables
    # Set secret values in Render Dashboard → Environment tab
    # Values marked "sync: false" must be set manually in the Dashboard
    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 4001

      # ── Database (Neon PostgreSQL) ──────────────────────────────────────
      # Set in Dashboard: postgresql://user:pass@host/db?sslmode=require
      - key: DATABASE_URL
        sync: false

      # ── Security ───────────────────────────────────────────────────────
      # Generate: openssl rand -base64 64
      - key: COOKIE_SECRET
        sync: false

      # ── Market Data APIs ───────────────────────────────────────────────
      - key: FINNHUB_KEY
        sync: false

      - key: ALPHA_VANTAGE_KEY
        sync: false

      - key: INDIANAPI_KEY
        sync: false

      # ── CORS — allow Vercel frontend ───────────────────────────────────
      # Already hardcoded in env.ts as https://stockstory-india.com
      # Set this if you need to add extra origins at runtime
      - key: EXTRA_ALLOWED_ORIGINS
        value: https://stockstory-india.com

  # ── One-off DB migration job ─────────────────────────────────────────────
  # Runs migrations before the API starts.
  # Trigger manually from Dashboard or via API on each deploy.
  - type: worker
    name: stockstory-migrate
    runtime: node
    region: singapore
    plan: starter
    branch: main
    buildCommand: npm ci && npm run build:backend
    startCommand: npm run migrate
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
