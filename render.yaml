# render.yaml
# Render Blueprint — StockStory India
# Architecture:
#   Frontend (SPA) + Backend (API proxy) → Render
#   API serverless functions → Vercel
#   Database → Neon (PostgreSQL)
#   Cache → Upstash (Redis)
# Deploys both the SPA (from dist/) and API proxy on Render free tier.
#
# ── Required Environment Variables (set in Render Dashboard) ───────────
#   DATABASE_URL    → Neon PostgreSQL connection string
#   COOKIE_SECRET   → openssl rand -base64 64
#   INDIANAPI_KEY   → from stock.indianapi.in
#   VERCEL_API_URL  → URL of the Vercel deployment hosting /api/* (optional)
#
# ── Optional ───────────────────────────────────────────────────────────
#   REDIS_URL       → Upstash Redis free tier (for rate limiting + cache)
#   GROQ_API_KEY    → Groq LLM API key (free, for AI analysis features)

services:
  - type: web
    name: stockstory-app
    runtime: node
    region: singapore
    plan: free
    branch: main
    buildCommand: NODE_ENV=development npm ci && npm run build:docker
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true

    envVars:
      # ── Runtime ────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.12.0
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: TZ
        value: Asia/Kolkata
      - key: NODE_OPTIONS
        value: --max-old-space-size=512

      # ── API Proxy: Vercel deployment hosting /api/* serverless fns ────
      - key: VERCEL_API_URL
        sync: false

      # ── Self origin (for CORS when accessed via onrender.com domain) ──
      - key: SELF_ORIGIN
        sync: false

      # ── Database (PostgreSQL via Neon free tier) ───────────────────────
      - key: DATABASE_URL
        sync: false

      - key: DB_ADAPTER
        value: postgres
      - key: ALLOW_SQLITE_FALLBACK
        value: "false"
      - key: ALLOW_SQLITE_IN_PRODUCTION
        value: "false"
      - key: FORCE_MIGRATIONS
        value: "true"

      # ── Security ───────────────────────────────────────────────────────
      - key: COOKIE_SECRET
        sync: false

      # ── CORS ───────────────────────────────────────────────────────────
      - key: EXTRA_ALLOWED_ORIGINS
        value: https://stockstory-india.com,https://www.stockstory-india.com

      # ── Redis (optional — backend uses in-memory cache when absent) ────
      - key: REDIS_URL
        sync: false

      # ── LLM / AI (optional — backend uses deterministic fallback when absent) ─
      - key: SGLANG_URL
        sync: false
      - key: LOCAL_AI_ENABLED
        value: "false"
      - key: ENABLE_RESEARCH_BOT
        value: "true"
      - key: ENABLE_SCORE_EXPLANATIONS
        value: "true"
      - key: ENABLE_STOCK_SNAPSHOTS
        value: "true"
      - key: ENABLE_STOCK_COMPARISON
        value: "true"
      - key: ENABLE_SCANNER_THESES
        value: "true"
      - key: ENABLE_THESIS_TRACKING
        value: "true"

      # ── Market Data (optional — required for live provider data) ───────
      - key: INDIANAPI_KEY
        sync: false

      # ── Firebase (optional — required for auth) ────────────────────────
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_USE_APPLICATION_DEFAULT_CREDENTIALS
        sync: false

      # ── Upstox (optional — for broker integration) ─────────────────────
      - key: UPSTOX_ACCESS_TOKEN
        sync: false
      - key: UPSTOX_CLIENT_SECRET
        sync: false
