# render.yaml
# Render Blueprint — StockStory India
# Deploys a single Web Service (backend API) on Render free tier.
# Frontend remains on Vercel; this service provides the database-backed API.

services:
  - type: web
    name: stockstory-api
    runtime: node
    region: singapore
    plan: free
    branch: main

    buildCommand: npm ci && npm run compile:backend
    startCommand: npm start

    healthCheckPath: /healthz

    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      - key: NODE_VERSION
        value: 22.12.0

      - key: HOST
        value: 0.0.0.0

      - key: PORT
        value: 10000

      # ── Database (Neon PostgreSQL) ──
      # Set in Dashboard: postgresql://user:pass@host/db?sslmode=require
      - key: DATABASE_URL
        sync: false

      # ── Security ──
      # Generate: openssl rand -base64 64
      - key: COOKIE_SECRET
        sync: false

      # ── Database Policy ──
      - key: DB_ADAPTER
        value: postgres

      - key: ALLOW_SQLITE_FALLBACK
        value: "false"

      - key: ALLOW_SQLITE_IN_PRODUCTION
        value: "false"

      - key: FORCE_MIGRATIONS
        value: "true"

      # ── CORS — allow Vercel frontend ──
      - key: EXTRA_ALLOWED_ORIGINS
        value: https://stockstory-india.com

      # ── Logging ──
      - key: LOG_LEVEL
        value: info
