# =========================================================================
# NGINX HIGH-CONCURRENCY GATEWAY — StockStory India
# Rate limiting, connection limits, gzip, security headers, API proxy.
# =========================================================================

# ── Request rate limiting (per IP) ────────────────────────────────────
# 10 requests/second per IP. Burst up to 25 with immediate processing.
limit_req_zone $binary_remote_addr zone=api_rate_limit:15m rate=10r/s;

# ── Concurrent connection limit (per IP) ─────────────────────────────
limit_conn_zone $binary_remote_addr zone=concurrent_conn_limit:10m;

# ── HTTP → HTTPS redirect ────────────────────────────────────────────
server {
    listen 80;
    server_name stockstory-india.com www.stockstory-india.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name stockstory-india.com www.stockstory-india.com;

    # ── TLS ──────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/stockstory-india.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stockstory-india.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── Performance tuning ───────────────────────────────────────────────
    client_body_buffer_size       128k;
    client_max_body_size           2m;
    client_header_buffer_size     1k;
    large_client_header_buffers  4 4k;

    client_body_timeout   12s;
    client_header_timeout 12s;
    keepalive_timeout     15s;
    send_timeout          10s;

    # ── Gzip compression ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
    gzip_vary on;

    # ── Security headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline' https://apis.google.com; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
         font-src 'self' https://fonts.gstatic.com; \
         img-src 'self' data: https:; \
         connect-src 'self' https://stockstory-india.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com wss://stockstory-india.com; \
         frame-src 'none';" always;

    root /usr/share/nginx/html;
    index index.html;

    # ── API reverse-proxy (rate-limited) ────────────────────────────────
    location /api/ {
        limit_req zone=api_rate_limit burst=25 nodelay;
        limit_conn concurrent_conn_limit 5;

        proxy_pass http://api:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # ── Static assets (long-lived cache) ────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback (React Router / query-string routing) ───────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
