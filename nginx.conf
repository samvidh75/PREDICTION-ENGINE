server {
    listen 80;
    server_name stockstory-india.com www.stockstory-india.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name stockstory-india.com www.stockstory-india.com;

    # ── TLS ──────────────────────────────────────────────────────────────
    # Replace with your actual cert paths (e.g. from Let's Encrypt / Certbot)
    ssl_certificate     /etc/letsencrypt/live/stockstory-india.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stockstory-india.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── Security headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline' https://apis.google.com; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
         font-src 'self' https://fonts.gstatic.com; \
         img-src 'self' data: https:; \
         connect-src 'self' https://stockstory-india.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com wss://stockstory-india.com; \
         frame-src 'none';" always;

    root /usr/share/nginx/html;
    index index.html;

    # ── API reverse-proxy ────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Static assets ────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback (React Router / query-string routing) ───────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
