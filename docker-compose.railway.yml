version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────────────────
  # LLM Service - Ollama with Fine-Tuned Models
  # ─────────────────────────────────────────────────────────────────────────
  llm:
    build:
      context: .
      dockerfile: Dockerfile.llm
    container_name: stockex-llm
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_NUM_GPU=0
      - OLLAMA_NUM_THREAD=4
    volumes:
      - ollama_models:/root/.ollama
      - ./stockex_slm_agent_output:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────
  # Backend API Service
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockex-api
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
      - OLLAMA_URL=http://llm:11434
      - OLLAMA_MODEL=qwen2.5:0.5b
      # Add other environment variables as needed
    depends_on:
      llm:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  ollama_models:
    driver: local

networks:
  default:
    name: stockex-network
    driver: bridge
