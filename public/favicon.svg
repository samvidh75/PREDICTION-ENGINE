<svg width="16" height="16" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- S-shaped upward trend line — represents "StockStory" and upward conviction -->
  <!-- Outer rounded square container -->
  <rect width="32" height="32" rx="8" fill="#1A56DB"/>
  <!-- Stylised rising spark/trend mark in white -->
  <!-- Three ascending bars of increasing height, Apple-style geometric -->
  <rect x="6" y="20" width="4" height="6" rx="1.5" fill="white" opacity="0.5"/>
  <rect x="14" y="14" width="4" height="12" rx="1.5" fill="white" opacity="0.75"/>
  <rect x="22" y="8" width="4" height="18" rx="1.5" fill="white"/>
  <!-- Rising dot accent above tallest bar -->
  <circle cx="24" cy="5.5" r="2" fill="#60A5FA"/>
</svg>
