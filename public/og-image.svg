    <rect x="107" y="79" width="280" height="280" rx="71" stroke="url(#tileEdge)" stroke-opacity="0.85" stroke-width="4"/>
    <path
      d="M138 126C138 110.8 150.8 98 166 98H336C359.4 98 372.5 125 358 143.4L246 285.6C235 299.6 214.3 301.8 200.4 290.8L146.6 248.2C141.1 243.9 138 237.3 138 230.3V126Z"
