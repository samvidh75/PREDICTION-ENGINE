      <stop offset="100%" stop-color="#040506"/>
    </linearGradient>
    <radialGradient id="redFluid" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(370 132) rotate(6) scale(500 180)">
