  <text x="458" y="398" font-family="Inter, system-ui, sans-serif" font-size="54" font-weight="600" letter-spacing="-2" fill="#FF6B6B">Connected execution path.</text>
  <text x="458" y="468" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400" fill="#94A3B8">Scanner, stock detail, tracking, portfolio context, and broker-ready follow-through in one product.</text>
