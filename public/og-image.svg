  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="370" cy="132" rx="520" ry="210" fill="url(#redFluid)"/>
  <ellipse cx="972" cy="158" rx="220" ry="134" fill="url(#blueGlow)"/>

