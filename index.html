<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ──────────────────────────────────────────────────── -->
    <title>StockStory India — Indian Equity Research Workspace</title>
    <meta
      name="description"
      content="StockStory India is a research workspace for Indian equities. Search companies, review source-backed scoring signals, and track watchlists with clear data availability labels."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://stockstory-india.com/" />

    <!-- ── Open Graph ───────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="StockStory India" />
    <meta property="og:title" content="StockStory India — Indian Equity Research Workspace" />
    <meta
      property="og:description"
      content="Search Indian companies, review source-backed scoring signals, and track watchlists with clear data availability labels."
    />
    <meta property="og:url" content="https://stockstory-india.com/" />
    <meta property="og:image" content="https://stockstory-india.com/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:locale" content="en_IN" />

    <!-- ── Twitter Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@StockStoryIndia" />
    <meta name="twitter:title" content="StockStory India — Indian Equity Research Workspace" />
    <meta
      name="twitter:description"
      content="Search Indian companies, review source-backed scoring signals, and track watchlists with clear data availability labels."
    />
    <meta name="twitter:image" content="https://stockstory-india.com/og-image.svg" />

    <!-- ── Theme & PWA ──────────────────────────────────────────────────── -->
    <meta name="theme-color" content="#0f1117" />
    <meta name="application-name" content="StockStory India" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StockStory" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Icons ───────────────────────────────────────────────────────── -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- ── Fonts ───────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Exo+2:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- ── Structured Data (JSON-LD) ────────────────────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "StockStory India",
        "url": "https://stockstory-india.com",
        "description": "Research workspace for Indian equities with source-backed scoring signals and clear data availability labels.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "INR"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
