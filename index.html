<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ──────────────────────────────────────────────────── -->
    <title>StockStory India — AI-Powered Indian Equity Research Platform</title>
    <meta name="description" content="StockStory India uses AI to research Nifty 50 stocks. Get proprietary scores across 5 dimensions — Quality, Growth, Valuation, Momentum & Risk. Live market data, fair value estimates, and analyst consensus." />
    <meta name="keywords" content="stock research india, nifty 50 analysis, ai stock analysis, indian equity research, stock story india, tcs stock analysis, hdfc bank research" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://stockstory-india.com/" />

    <!-- ── Preconnect ───────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet" />

    <!-- ── Open Graph ───────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="StockStory India" />
    <meta property="og:title" content="StockStory India — AI-Powered Stock Research for Indian Markets" />
    <meta property="og:description" content="AI-powered research on 50+ Nifty stocks. Proprietary scores across 5 dimensions. Live prices, fair value estimates, and analyst consensus — updated daily." />
    <meta property="og:url" content="https://stockstory-india.com/" />
    <meta property="og:image" content="https://stockstory-india.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="StockStory India — AI-powered Indian equity research platform" />
    <meta property="og:locale" content="en_IN" />

    <!-- ── Twitter Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@StockStoryIndia" />
    <meta name="twitter:title" content="StockStory India — AI-Powered Stock Research" />
    <meta name="twitter:description" content="AI-powered research on 50+ Nifty stocks. Proprietary scores across 5 dimensions. Live data, fair value estimates, and analyst consensus." />
    <meta name="twitter:image" content="https://stockstory-india.com/og-image.png" />
    <meta name="twitter:image:alt" content="StockStory India platform screenshot" />

    <!-- ── Theme & PWA ──────────────────────────────────────────────────── -->
    <meta name="theme-color" content="#000000" />
    <meta name="application-name" content="StockStory India" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="StockStory" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Icons ───────────────────────────────────────────────────────── -->
    <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="/stockstory-mark.svg" type="image/svg+xml" />
    <link rel="icon" href="/icon-192.svg" type="image/svg+xml" sizes="192x192" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Structured Data (JSON-LD) ────────────────────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "StockStory India",
        "url": "https://stockstory-india.com",
        "description": "AI-powered equity research platform for Indian stock markets. Proprietary scoring across 5 dimensions: Quality, Growth, Valuation, Momentum, and Risk.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "image": "https://stockstory-india.com/og-image.png",
        "publisher": {
          "@type": "Organization",
          "name": "StockStory India",
          "url": "https://stockstory-india.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://stockstory-india.com/logo-512.png",
            "width": 512,
            "height": 512
          },
          "sameAs": [
            "https://twitter.com/StockStoryIndia"
          ]
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "INR"
        }
      }
    </script>

    <!-- ── Breadcrumb JSON-LD ───────────────────────────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://stockstory-india.com/" },
          { "@type": "ListItem", "position": 2, "name": "Research", "item": "https://stockstory-india.com/?page=scanner" },
          { "@type": "ListItem", "position": 3, "name": "Stock Analysis", "item": "https://stockstory-india.com/?page=stock&id=TCS" }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
