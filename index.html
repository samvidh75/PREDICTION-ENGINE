<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ──────────────────────────────────────────────────── -->
    <title>StockStory India — Indian Equity Research Workspace</title>
    <meta
      name="description"
      content="StockStory India is a research workspace for Indian equities. Search companies, review source-backed scoring signals, and track watchlists with clear data availability labels."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://stockstory-india.com/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet" />

    <!-- ── Open Graph ───────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="StockStory India" />
    <meta property="og:title" content="StockStory India — AI Equity Research" />
    <meta
      property="og:description"
      content="Search Indian companies, review source-backed scoring signals, and track watchlists with clear data availability labels."
    />
    <meta property="og:url" content="https://stockstory-india.com/" />
    <meta property="og:image" content="https://stockstory-india.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="StockStory India — AI equity research" />
    <meta property="og:locale" content="en_IN" />

    <!-- ── Twitter Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@StockStoryIndia" />
    <meta name="twitter:title" content="StockStory India — Indian Equity Research Workspace" />
    <meta
      name="twitter:description"
      content="Search Indian companies, review source-backed scoring signals, and track watchlists with clear data availability labels."
    />
    <meta name="twitter:image" content="https://stockstory-india.com/og-image.png" />
    <meta name="twitter:image:alt" content="StockStory India — AI equity research" />

    <!-- ── Theme & PWA ──────────────────────────────────────────────────── -->
    <meta name="theme-color" content="#0F1A31" />
    <meta name="application-name" content="StockStory India" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="StockStory" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Icons ───────────────────────────────────────────────────────── -->
    <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="/stockstory-mark.svg" type="image/svg+xml" />
    <link rel="icon" href="/icon-192.svg" type="image/svg+xml" sizes="192x192" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Structured Data (JSON-LD) ────────────────────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "StockStory India",
        "url": "https://stockstory-india.com",
        "description": "Research workspace for Indian equities with source-backed scoring signals and clear data availability labels.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "image": "https://stockstory-india.com/og-image.png",
        "publisher": {
          "@type": "Organization",
          "name": "StockStory India",
          "url": "https://stockstory-india.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://stockstory-india.com/logo-512.png",
            "width": 512,
            "height": 512
          }
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "INR"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
