version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace:cached
      - node_modules:/workspace/node_modules
    ports:
      - "4001:4001"
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - DB_ADAPTER=sqlite
      - ALLOW_SQLITE_FALLBACK=true
      - SQLITE_DB_PATH=/workspace/tmp/dev-sqlite.db
      - COOKIE_SECRET=dev-only-not-secret
    depends_on:
      - postgres
    command: ["npm", "run", "start:dev"]

  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=stockstory
      - POSTGRES_PASSWORD=stockstory_dev
      - POSTGRES_DB=prediction_engine
    ports:
      - "5432:5432"

volumes:
  node_modules:
  pgdata:
